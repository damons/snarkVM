[package]
name = "snarkvm-synthesizer-snark"
version = "4.0.0"
authors = [ "The Aleo Team <hello@aleo.org>" ]
description = "SNARK wrappers for a decentralized virtual machine"
homepage = "https://aleo.org"
repository = "https://github.com/ProvableHQ/snarkVM"
keywords = [
  "aleo",
  "cryptography",
  "blockchain",
  "decentralized",
  "zero-knowledge"
]
categories = [
  "compilers",
  "cryptography",
  "mathematics",
  "wasm",
  "web-programming"
]
include = [ "Cargo.toml", "src", "README.md", "LICENSE.md" ]
license = "Apache-2.0"
edition = "2024"

[features]
default = [ ]
aleo-cli = [ "colored" ]
cuda = [ "snarkvm-algorithms/cuda" ]
serial = [ "snarkvm-console/serial", "snarkvm-algorithms/serial" ]
wasm = [ "snarkvm-console/wasm" ]

[dependencies.snarkvm-circuit]
workspace = true

[dependencies.snarkvm-console]
workspace = true
default-features = false
features = [ "network" ]

[dependencies.snarkvm-algorithms]
workspace = true

[dependencies.bincode]
workspace = true

[dependencies.colored]
workspace = true
optional = true

[dependencies.serde_json]
workspace = true
features = [ "preserve_order" ]

[dev-dependencies.snarkvm-console]
workspace = true
default-features = false
features = [ "types" ]
