    steps:
      - run_test:
          workspace_member: snarkvm-console-types

  console-types-address:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-console-types-address

  console-types-boolean:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
