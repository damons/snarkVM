    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-collections
          cache_key_suffix: -noconsole
          flags: --no-default-features

  circuit-environment:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-environment

  circuit-network:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-network

  circuit-program:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-program

  circuit-types:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-types

  circuit-types-address:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-types-address

  circuit-types-boolean:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-types-boolean

  circuit-types-field:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-types-field

  circuit-types-group:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-types-group

  circuit-types-integers:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-types-integers
          flags: -- --ignored

  circuit-types-scalar:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-types-scalar

  circuit-types-string:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-types-string

  console:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-console

  console-account:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-console-account

  console-algorithms:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-console-algorithms

  console-collections:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-console-collections

  console-network:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-console-network

  console-network-environment:
