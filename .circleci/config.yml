    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-fields

  ledger:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger

  ledger-with-rocksdb-partition1:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger
          flags: --release --features=rocks --partition count:1/2 -- --test-threads=10
          no_output_timeout: 20m
          timeout: 30m

  ledger-with-rocksdb-partition2:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger
          flags: --release --features=rocks --partition count:2/2 -- --test-threads=10
          no_output_timeout: 20m
          timeout: 30m

  ledger-with-valid-solutions:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger
          cache_key_suffix: -with-vaild-solutions
          flags: valid_solutions --features=test

  ledger-authority:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-authority

  ledger-block:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-block
          no_output_timeout: 20m
          timeout: 30m

  ledger-committee:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-committee

  ledger-narwhal:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-narwhal

  ledger-narwhal-batch-certificate:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-narwhal-batch-certificate

  ledger-narwhal-batch-header:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-narwhal-batch-header

  ledger-narwhal-data:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-narwhal-data

  ledger-narwhal-subdag:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-narwhal-subdag

  ledger-narwhal-transmission:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-narwhal-transmission

  ledger-narwhal-transmission-id:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-narwhal-transmission-id

  ledger-puzzle:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-puzzle

  ledger-puzzle-epoch:
    executor: rust-docker
    resource_class: << pipeline.parameters.large >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-puzzle-epoch

  ledger-query:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-query

  ledger-store:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-store
          flags: --features=rocks

  ledger-test-helpers:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-ledger-test-helpers

  parameters:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          timeout: 20m
          workspace_member: snarkvm-parameters
          flags: -- --test-threads=2

  parameters-large:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-parameters
          flags: --no-run --features large_params
          cache_key_suffix: -large
          # Compilation can take very long and produce no output for a while.
          no_output_timeout: 20m
          timeout: 30m

  parameters-uncached:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-parameters
          flags: -- --test-threads=2 --ignored test_load_bytes_mini
          cache_key_suffix: -v-{{ epoch }}
          no_output_timeout: 20m
          timeout: 30m

  synthesizer:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer
          flags: --lib --bins -- --test-threads 16
          no_output_timeout: 20m
          timeout: 30m

  synthesizer-test-partition1:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer
          # nextest args before `--`, libtest args after `--`
          flags: >
            --lib --bins --features test
            --partition count:1/2
            -- --test-threads 8
          cache_key_suffix: -test1
          timeout: 25m

  synthesizer-test-partition2:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer
          flags: >
            --lib --bins --features test
            --partition count:2/2
            -- --test-threads 8
          cache_key_suffix: -test2
          timeout: 25m

  synthesizer-integration:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          timeout: 30m
          # test_vm_execute_and_finalize can take over 10 minutes in the current setup
          no_output_timeout: 20m
          workspace_member: snarkvm-synthesizer
          flags: --test '*' --features test -- --test-threads=4
          cache_key_suffix: -integration

  synthesizer-process:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-process

  synthesizer-process-with-rocksdb:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-process
          flags: --features=rocks -- --test-threads=4
          cache_key_suffix: -with-rocksdb

  synthesizer-program:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-program
          flags: --lib --bins

  synthesizer-program-integration:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-program
          flags: -- --skip keccak --skip psd --skip sha --skip instruction::is --skip instruction::equal --skip instruction::commit --test-threads=8
          cache_key_suffix: -integration

  synthesizer-program-integration-keccak:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-program
          flags: keccak
          timeout: 30m
          no_output_timeout: 20m
          cache_key_suffix: -integration-keccak

  synthesizer-program-integration-psd:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-program
          flags: psd
          cache_key_suffix: -integration-psd

  synthesizer-program-integration-sha:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-program
          flags: sha
          timeout: 30m
          no_output_timeout: 20m
          cache_key_suffix: -integration-sha

  synthesizer-program-integration-instruction-is:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-program
          flags: instruction::is
          cache_key_suffix: -integration-is

  synthesizer-program-integration-instruction-equal:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-program
          flags: instruction::equal
          cache_key_suffix: -integration-equal

  synthesizer-program-integration-instruction-commit:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-program
          flags: instruction::commit
          cache_key_suffix: -integration-commit

  synthesizer-snark:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-synthesizer-snark

  utilities:
    executor: rust-docker
    resource_class: << pipeline.parameters.large >>
    steps:
      - run_test:
          workspace_member: snarkvm-utilities

  utilities-derives:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-utilities-derives

  wasm:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-wasm-cache
      - run:
          no_output_timeout: 30m
          command: |
            # The commands required to install current Node.js come from https://nodejs.org/en/download
            # The versions of nvm and Node.js may need to be periodically updated
            # Download and install nvm
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
            # Add nvm to the path
            source /home/circleci/.profile
            # Download and install Node.js
            nvm install 22
            # Install wasm-pack
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
            # Run the tests
            cd wasm && wasm-pack test --node
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-wasm-cache

  check-fmt:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - checkout
      - install_rust_nightly
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-fmt-cache
      - run:
          name: Check style
          no_output_timeout: 35m
          command: cargo +nightly fmt --all -- --check
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-fmt-cache

  check-unused-dependencies:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-machete-cache
      - run:
          name: Check for unused dependencies
          no_output_timeout: 10m
          command: |
            set -euo pipefail
            if ! command -v cargo-machete >/dev/null 2>&1; then
              cargo install cargo-machete@0.7.0 --locked
            fi
            cargo machete
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-machete-cache

  check-cargo-audit:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-cargo-audit-cache
      - run:
          name:  Check for security vulnerabilities
          no_output_timeout: 10m
          command: |
            cargo install cargo-audit@0.21.2 --locked
            cargo audit -D warnings
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-cargo-audit-cache

  check-cargo-semver-checks:
    executor: rust-docker
    resource_class: << pipeline.parameters.twoxlarge >>
    steps:
      - checkout:
          method: full
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-cargo-semver-checks-cache
      - run:
          name: Check for semver violations
          no_output_timeout: 15m
          command: |
            bash ./.circleci/semver-checks.sh

      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-cargo-semver-checks-cache

  check-clippy:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-clippy-cache
      - run:
          name: Check Clippy (default features)
          timeout: 20m
          command: |
            cargo clippy --workspace --all-targets -- -D warnings
      - run:
          name: Check Clippy (all features)
          timeout: 20m
          command: |
            cargo clippy --workspace --all-targets --all-features -- -D warnings
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-clippy-cache

  check-all-targets:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-all-targets-cache
      - run:
          name: Check all targets
          no_output_timeout: 35m
          command: cargo check --release --workspace --all-targets
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-all-targets-cache

  verify-windows:
    executor:
      name: windows/default
      size: xlarge
    environment:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    parameters:
      workspace_member:
        type: string
    steps:
      - check_windows:
          workspace_member: << parameters.workspace_member >>

workflows:
  version: 2

  cargo-workflow:
    jobs:
      - check-fmt
      - check-clippy
      - check-unused-dependencies
      - check-cargo-audit
      - check-cargo-semver-checks
      - check-all-targets

  circuit-workflow:
    jobs:
      - circuit
      - circuit-account
      - circuit-account-noconsole
      - circuit-algorithms
      - circuit-collections
      - circuit-collections-noconsole
      - circuit-environment
      - circuit-network
      - circuit-program
      - circuit-types
      - circuit-types-address
      - circuit-types-boolean
      - circuit-types-field
      - circuit-types-group
      - circuit-types-integers
      - circuit-types-scalar
      - circuit-types-string

  console-workflow:
    jobs:
      - console
      - console-account
      - console-algorithms
      - console-collections
      - console-network
      - console-network-environment
      - console-program
      - console-types
      - console-types-address
      - console-types-boolean
      - console-types-field
      - console-types-group
      - console-types-integers
      - console-types-scalar
      - console-types-string

  ledger-workflow:
    jobs:
      - ledger
      - ledger-with-rocksdb-partition1
      - ledger-with-rocksdb-partition2
      - ledger-with-valid-solutions
      - ledger-authority
      - ledger-block
      - ledger-committee
      - ledger-narwhal
      - ledger-narwhal-batch-certificate
      - ledger-narwhal-batch-header
      - ledger-narwhal-data
      - ledger-narwhal-subdag
      - ledger-narwhal-transmission
      - ledger-narwhal-transmission-id
      - ledger-puzzle
      - ledger-puzzle-epoch
      - ledger-query
      - ledger-store
      - ledger-test-helpers

  synthesizer-workflow:
    jobs:
      - synthesizer
      - synthesizer-test-partition1
      - synthesizer-test-partition2
      - synthesizer-integration
      - synthesizer-process
      - synthesizer-process-with-rocksdb
      - synthesizer-program
      - synthesizer-program-integration
      - synthesizer-program-integration-keccak
      - synthesizer-program-integration-psd
      - synthesizer-program-integration-sha
      - synthesizer-program-integration-instruction-is
      - synthesizer-program-integration-instruction-equal
      - synthesizer-program-integration-instruction-commit
      - synthesizer-snark

  snarkvm-workflow:
    jobs:
      - snarkvm
      - algorithms
      - algorithms-profiler
      - curves
      - fields
      - parameters
      - parameters-large
      - parameters-uncached
      - utilities
      - utilities-derives
      - wasm

  windows-workflow:
    jobs:
      - verify-windows:
          matrix:
            parameters:
              workspace_member: [
                algorithms,
                circuit,
                console,
                curves,
                fields,
                ledger,
                parameters,
                synthesizer,
                utilities,
              ]
