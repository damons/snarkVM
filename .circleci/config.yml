version: 2.1

parameters:
  small:
    type: string
    default: small
  medium:
    type: string
    default: medium
  large:
    type: string
    default: large
  xlarge:
    type: string
    default: xlarge
  twoxlarge:
    type: string
    default: 2xlarge

orbs:
  windows: circleci/windows@5.0

executors:
  # The default docker image used in the main-workflow
  rust-docker:
    docker:
      - image: cimg/rust:1.88.0 # Attention - Change the MSRV in Cargo.toml and rust-toolchain as well

commands:
  check_windows:
    description: "Runs cargo check on Windows"
    parameters:
      workspace_member:
        type: string
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-cache-{{ arch }}-{{ checksum "Cargo.lock" }}
            - cargo-cache-{{ arch }}-
      - run:
          name: "Install Rust"
          no_output_timeout: 15m
          command: |
            $ErrorActionPreference = "Stop"
            $ProgressPreference = "SilentlyContinue"

            # Ensure rustup is installed
            if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
                Write-Host "rustup not found, installing..."
                $rustupPath = "$env:TEMP\rustup-init.exe"
                Invoke-WebRequest -Uri "https://win.rustup.rs/" -OutFile $rustupPath
                & $rustupPath -y --default-toolchain "1.88.0-x86_64-pc-windows-msvc" --no-modify-path --profile minimal
            } else {
                Write-Host "rustup already installed, ensuring toolchain 1.88.0-x86_64-pc-windows-msvc is present..."
                rustup toolchain install 1.88.0-x86_64-pc-windows-msvc
            }

            # Put cargo/rustup first in PATH for this step and subsequent steps
            $Env:Path = "$Env:USERPROFILE\.cargo\bin;$Env:Path"

            # Select the toolchain
            rustup default 1.88.0-x86_64-pc-windows-msvc

            # Verify the installation.
            cargo --version --verbose
            rustc --version | Out-File -FilePath "rust-version"

            if (!(Test-Path "Cargo.lock" -PathType Leaf)) {
                cargo generate-lockfile
            }
      - run:
          name: "Run cargo check"
          command: |
            # Add cargo to PATH (for safety in case env is not carried perfectly)
            $Env:Path = "$Env:USERPROFILE\.cargo\bin;$Env:Path"

            # Check that the given package compiles
            cd << parameters.workspace_member >>
            cargo check --examples --benches --tests
      - save_cache:
          paths:
            - C:\Users\circleci\.cargo\registry
            - C:\Users\circleci\.cargo\git
            - target
          key: cargo-cache-{{ arch }}-{{ checksum "Cargo.lock" }}

  setup_environment:
    description: "Setup testing environment"
    parameters:
      cache_key:
        type: string
        default: v4.2.0-rust-1.88.0-snarkvm-cache

    steps:
      - run:
          name: Prepare environment variables and install dependencies
          command: |
            # Make sure our local bin and cargo bin are on PATH
            echo 'export PATH="$HOME/.cargo/bin:$CIRCLE_WORKING_DIRECTORY/.bin:$PATH"' >> "$BASH_ENV"

            # sccache settings
            echo 'export SCCACHE_DIR="$HOME/.cache/sccache"' >> "$BASH_ENV"
            echo 'export SCCACHE_CACHE_SIZE="20000M"' >> "$BASH_ENV"
            echo 'export SCCACHE_IDLE_TIMEOUT=0' >> "$BASH_ENV"   # keep server alive
            echo 'export SCCACHE_LOG=info' >> "$BASH_ENV"

            # Disable incremental builds so sccache behaves nicely
            echo 'export CARGO_INCREMENTAL=0' >> "$BASH_ENV"

            # Use sccache for *all* Rust compile commands
            echo 'export RUSTC_WRAPPER="sccache"' >> "$BASH_ENV"

            #mkdir -p .cargo
            #printf '%s\n' \
            #  '[build]' \
            #  'rustc-wrapper = "/home/circleci/project/.bin/sccache"' \
            #  > .cargo/config.toml

      - run:
          name: Install sccache
          command: |
            export WORK_DIR="$HOME/.cache/sccache"
            export SCCACHE_DIR="$HOME/.cache/sccache"
            export SCCACHE_VERSION=v0.10.0
            export SCCACHE_PKG="sccache-$SCCACHE_VERSION-x86_64-unknown-linux-musl"

            mkdir -p "$CIRCLE_WORKING_DIRECTORY/.bin"
            mkdir -p "$HOME/.cache/sccache"
            if [ ! -x "$CIRCLE_WORKING_DIRECTORY/.bin/sccache" ]; then
              wget "https://github.com/mozilla/sccache/releases/download/$SCCACHE_VERSION/$SCCACHE_PKG.tar.gz"
              tar -C "$CIRCLE_WORKING_DIRECTORY/.bin" -xvf "$SCCACHE_PKG.tar.gz"
              chmod +x "$CIRCLE_WORKING_DIRECTORY/.bin/$SCCACHE_PKG/sccache"
              mv "$CIRCLE_WORKING_DIRECTORY/.bin/$SCCACHE_PKG/sccache" "$CIRCLE_WORKING_DIRECTORY/.bin/sccache"
              rm -rf "$CIRCLE_WORKING_DIRECTORY/.cargo/registry"
            fi

      - run:
          name: Install debian packages
          command: |
            DEBIAN_FRONTEND=noninteractive sudo apt-get update
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y --no-install-recommends clang llvm-dev llvm lld pkg-config xz-utils make libssl-dev libssl-dev

      - restore_cache:
          keys:
            - v4.2.0-rust-1.88.0-deps-{{ checksum "Cargo.lock" }}-
            - v4.2.0-rust-1.88.0-deps-

      - restore_cache:
          keys:
            - << parameters.cache_key >>

  clear_environment:
    description: "Clear environment"
    parameters:
      cache_key:
        type: string
        default: v4.2.0-rust-1.88.0-snarkvm-cache
    steps:
      - run: set +e
      - save_cache:
          key: v4.2.0-rust-1.88.0-deps-{{ checksum "Cargo.lock" }}-{{ epoch }}
          paths:
            - /home/circleci/.cache/sccache
            - /home/circleci/.cargo/registry
            - /home/circleci/.cargo/git
            - /home/circleci/.rustup
            - /home/circleci/.cargo/bin
            - /home/circleci/project/.bin
      - save_cache:
          key: << parameters.cache_key >>
          paths:
            - /home/circleci/project/target
            - /home/circleci/.aleo/resources

  run_test:
    description: "Build and run tests"
    parameters:
      workspace_member:
        type: string
      flags:
        type: string
        default: ""
      cache_key_suffix:
        type: string
        default: ""
      timeout:
        type: string
        default: 10m
      no_output_timeout:
        type: string
        default: 10m
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-<< parameters.workspace_member >><< parameters.cache_key_suffix >>-cache


      - run:
          name: Install cargo-nextest
          command: |
            set -euo pipefail

            BIN_ROOT="$CIRCLE_WORKING_DIRECTORY/.bin"
            mkdir -p "$BIN_ROOT"

            export PATH="$HOME/.cargo/bin:$PATH"
            if ! command -v cargo-nextest >/dev/null 2>&1; then
              cargo install cargo-nextest --locked
            fi

      - run:
          name: Debug rustc wrapper
          command: |
            echo "RUSTC_WRAPPER=${RUSTC_WRAPPER:-<unset>}"
            which sccache || echo "sccache not found on PATH"
            which rustc || echo "rustc not found on PATH"

      - run:
          name: "Run Tests"
          timeout: << parameters.timeout >>
          no_output_timeout: << parameters.no_output_timeout >>
          command: |
            set -euo pipefail
            export CARGO_TERM_COLOR=never

            echo "[debug] PATH=$PATH"
            echo "[debug] RUSTC_WRAPPER=${RUSTC_WRAPPER:-<unset>}"
            which sccache || echo "[debug] sccache not found on PATH"
            which rustc || echo "[debug] rustc not found on PATH"
            echo "[debug] SCCACHE_DIR=${SCCACHE_DIR:-<unset>}"
            echo "[debug] SCCACHE_LOG=${SCCACHE_LOG:-<unset>}"
            echo "[debug] SCCACHE_IDLE_TIMEOUT=${SCCACHE_IDLE_TIMEOUT:-<unset>}"

            "$CIRCLE_WORKING_DIRECTORY/.bin/sccache" --zero-stats || true
            echo "[sccache stats BEFORE nextest]"
            "$CIRCLE_WORKING_DIRECTORY/.bin/sccache" -s || true

            # Create artifact + nextest output directories
            mkdir -p artifacts target/nextest/ci

            # Create artifact + nextest output directories
            OUT="artifacts/<< parameters.workspace_member >>-nextest.txt"
            CSV="artifacts/<< parameters.workspace_member >>-test-times.csv"
            TOP="artifacts/<< parameters.workspace_member >>-slow-tests-top30.csv"
            JUNIT="target/nextest/ci/junit.xml"

            # Extract and trim flags from parameters
            FLAGS_FULL="<< parameters.flags >>"
            FLAGS_TRIM="$(printf '%s' "$FLAGS_FULL" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

            # Split flags into cargo build flags (before --) and libtest args (after --)
            RIGHT_OF_SEP=""
            if printf '%s' "$FLAGS_TRIM" | grep -q ' -- '; then
              BUILD_FLAGS="${FLAGS_TRIM%% -- *}"
              RIGHT_OF_SEP="${FLAGS_TRIM#* -- }"
            elif printf '%s' "$FLAGS_TRIM" | grep -Eq '^--[[:space:]]'; then
              BUILD_FLAGS=""
              RIGHT_OF_SEP="${FLAGS_TRIM#-- }"
            else
              BUILD_FLAGS="$FLAGS_TRIM"
            fi

            # Remove any --test target flags,they cause nextest build errors
            BUILD_FLAGS_SANITIZED="$(printf '%s' "$BUILD_FLAGS" \
              | sed -E "s/(^|[[:space:]])--test[[:space:]]+'[^']*'([[:space:]]|$)/ /g" \
              | sed -E 's/(^|[[:space:]])--test[[:space:]]+\"[^\"]*\"([[:space:]]|$)/ /g' \
              | sed -E 's/(^|[[:space:]])--test[[:space:]]+[^[:space:]]+([[:space:]]|$)/ /g' \
              | tr -s ' ' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
            )"

            # Detect wildcard integration selection: `--test '*'` (with or without quotes)
            HAS_TEST_WILDCARD=0
            if printf '%s\n' "$BUILD_FLAGS" | grep -Eq -- '--test[[:space:]]+("\*"|'\''\*'\''|\*)'; then
              HAS_TEST_WILDCARD=1
            fi

            # Build nextest filter expression from any --skip <pattern> arguments
            FILTER_EXPR=""

            WSM="<< parameters.workspace_member >>"
            if [ "$WSM" = "snarkvm-synthesizer" ] && [ "$HAS_TEST_WILDCARD" -eq 1 ]; then
              FILTER_EXPR='test(/test_command_parse/)+test(/test_instruction_parse/)+test(/test_process_execute/)+test(/test_program_parse/)+test(/test_vm_execute_and_finalize/)'
            fi

            # Build nextest filter expression from any --skip <pattern> arguments
            if [ -z "$FILTER_EXPR" ] && [ -n "$RIGHT_OF_SEP" ]; then
              SKIPS="$(printf '%s\n' "$RIGHT_OF_SEP" \
                | sed -E 's/[[:space:]]+/ /g' \
                | grep -oE -- '--skip[[:space:]]+(\"[^\"]+\"|'\''[^'\'']+'\''|[^[:space:]]+)' || true)"
              if [ -n "$SKIPS" ]; then
                EXPRS=""
                tmpf="$(mktemp)"
                printf '%s\n' "$SKIPS" > "$tmpf"
                while IFS= read -r line; do
                  pat="${line#--skip }"
                  pat="${pat%\"}"; pat="${pat#\"}"
                  pat="${pat%\'}"; pat="${pat#\'}"
                  pat_rx="${pat//\//\\/}"  # escape forward slashes for regex
                  if [ -z "$EXPRS" ]; then
                    EXPRS="test(/$pat_rx/)"
                  else
                    EXPRS="$EXPRS or test(/$pat_rx/)"
                  fi
                done < "$tmpf"
                rm -f "$tmpf"
                if [ -n "$EXPRS" ]; then
                  FILTER_EXPR="not ($EXPRS)"
                fi
              fi
            fi

            # Detect and extract --test-threads value (used to set JOBS)
            TEST_THREADS=""
            if [ -n "$RIGHT_OF_SEP" ]; then
              # form: --test-threads=8
              TEST_THREADS="$(printf '%s\n' "$RIGHT_OF_SEP" | sed -nE 's/.*--test-threads=([0-9]+).*/\1/p' | head -n1)"
              if [ -z "$TEST_THREADS" ]; then
                # form: --test-threads 8
                TEST_THREADS="$(printf '%s\n' "$RIGHT_OF_SEP" | sed -nE 's/.*--test-threads[[:space:]]+([0-9]+).*/\1/p' | head -n1)"
              fi
            fi

            DEFAULT_JOBS=8

            JOBS="${NEXTEST_JOBS:-$DEFAULT_JOBS}"
            if [ -n "$TEST_THREADS" ]; then
              JOBS="$TEST_THREADS"
            fi

            # Create nextest config (disable fail-fast, add slow-timeout + JUnit output)
            SLOW_PERIOD="${NEXTEST_SLOW_PERIOD:-60s}"
            CFG_ARGS=()
            TMPD="$(mktemp -d)"
            if [ -f ".config/nextest.toml" ]; then
              CFG_ARGS+=(--config-file ".config/nextest.toml")
            fi
            {
              printf '%s\n' '[profile.ci]'
              printf '%s\n' 'fail-fast = false'
              printf '%s\n' "slow-timeout = \"${SLOW_PERIOD}\""
              printf '%s\n' ''
              printf '%s\n' '[profile.ci.junit]'
              printf '%s\n' 'path = "junit.xml"'
            } > "$TMPD/nextest-override.toml"
            CFG_ARGS+=(--config-file "$TMPD/nextest-override.toml")

            # Print configuration summary for debugging
            echo "==> nextest package: << parameters.workspace_member >>"
            echo "==> build flags (sanitized): '${BUILD_FLAGS_SANITIZED}'"
            echo "==> filter-expr: ${FILTER_EXPR:-<none>}  (right-of-sep: ${RIGHT_OF_SEP:-<none>})"
            echo "==> test-threads override: ${TEST_THREADS:-<none>}"
            echo "==> jobs: ${JOBS}"

            # Use plain cargo test if --no-run was requested
            # Otherwise, run tests with cargo nextest
            if printf '%s' " $BUILD_FLAGS_SANITIZED " | grep -q ' --no-run '; then
              RUST_MIN_STACK=67108864 cargo test --package="<< parameters.workspace_member >>" $BUILD_FLAGS_SANITIZED | tee "$OUT"
              : > "$CSV"; : > "$TOP"
            else
              RUST_MIN_STACK=67108864 \
              cargo nextest run \
                -p "<< parameters.workspace_member >>" $BUILD_FLAGS_SANITIZED \
                --profile ci -j "${JOBS}" "${CFG_ARGS[@]}" \
                --status-level fail --hide-progress-bar \
                --no-tests=pass \
                ${FILTER_EXPR:+--filter-expr "$FILTER_EXPR"} \
                2>&1 | tee "$OUT"

              # Parse junit.xml to extract test timings
              if [ -f "$JUNIT" ]; then
                awk -v RS='<testcase ' '
                  NR>1 {
                    name=""; classname=""; time="";
                    start=index($0,"classname=\""); if(start>0){ start+=11; rest=substr($0,start); end=index(rest,"\""); if(end>0) classname=substr(rest,1,end-1) }
                    start=index($0,"name=\"");      if(start>0){ start+=6;  rest=substr($0,start); end=index(rest,"\""); if(end>0) name=substr(rest,1,end-1) }
                    start=index($0,"time=\"");      if(start>0){ start+=6;  rest=substr($0,start); end=index(rest,"\""); if(end>0) time=substr(rest,1,end-1) }
                    if(name!="" && time!=""){ full=(classname!=""?classname"::"name:name); printf "%s,%s\n", full, time }
                  }
                ' "$JUNIT" > "$CSV" || true

                # Sort and store top 30 slowest tests
                sort -t, -k2,2nr "$CSV" | head -n 30 > "$TOP" || true
              else
                echo "WARN: $JUNIT not found; no timings extracted." >&2
                : > "$CSV"; : > "$TOP"
              fi
            fi

            echo "[sccache stats AFTER nextest]"
            "$CIRCLE_WORKING_DIRECTORY/.bin/sccache" -s || true

      - store_artifacts:
          path: artifacts
          destination: test-timings/<< parameters.workspace_member >>
      - store_test_results:
          path: target/nextest/ci

      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-<< parameters.workspace_member >><< parameters.cache_key_suffix >>-cache


  install_rust_nightly:
    description: "Install Rust nightly toolchain"
    steps:
      - run: rustup toolchain install nightly-x86_64-unknown-linux-gnu

jobs:
  snarkvm:
    executor: rust-docker
    resource_class: << pipeline.parameters.large >>
    steps:
      - checkout
      - run_test:
          workspace_member: snarkvm

  algorithms:
    executor: rust-docker
    resource_class: << pipeline.parameters.large >>
    steps:
      - run_test:
          workspace_member: snarkvm-algorithms

  algorithms-profiler:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - run_test:
          workspace_member: snarkvm-algorithms
          flags: varuna::prove_and_verify_with_square_matrix --features profiler
          cache_key_suffix: -profiler-test

  circuit:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit

  circuit-account:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-account

  # This checks that no `console` structs are used in core circuit logic.
  circuit-account-noconsole:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - run_test:
          workspace_member: snarkvm-circuit-account
          cache_key_suffix: -noconsole
          flags: --no-default-features

  circuit-algorithms:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
