    steps:
      - checkout
      - install_rust_nightly
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-fmt-cache
      - run:
          name: Check style
          no_output_timeout: 35m
          command: cargo +nightly fmt --all -- --check
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-fmt-cache

  check-unused-dependencies:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-machete-cache
      - run:
          name: Check for unused dependencies
          no_output_timeout: 10m
          command: |
            cargo install cargo-machete@0.7.0
            cargo machete
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-machete-cache

  check-cargo-audit:
    executor: rust-docker
    resource_class: << pipeline.parameters.medium >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-cargo-audit-cache
      - run:
          name:  Check for security vulnerabilities
          no_output_timeout: 10m
          command: |
            cargo install cargo-audit@0.21.2 --locked
            cargo audit -D warnings
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-cargo-audit-cache

  check-cargo-semver-checks:
    executor: rust-docker
    resource_class: << pipeline.parameters.large >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-cargo-semver-checks-cache
      - run:
          name: Check for semver violations
          no_output_timeout: 15m
          command: |
            cargo install cargo-semver-checks@0.43.0 --locked
            BASELINE_REV=eff84712b # UPDATE ME ON NECESSARY BREAKING CHANGES
            cargo semver-checks --workspace --default-features --baseline-rev $BASELINE_REV
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-cargo-semver-checks-cache

  check-clippy:
    executor: rust-docker
    resource_class: << pipeline.parameters.xlarge >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-clippy-cache
      - run:
          name: Check Clippy (default features)
          timeout: 20m
          command: |
            cargo clippy --workspace --all-targets -- -D warnings
      - run:
          name: Check Clippy (all features)
          timeout: 20m
          command: |
            cargo clippy --workspace --all-targets --all-features -- -D warnings
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-clippy-cache

  check-all-targets:
    executor: rust-docker
    resource_class: << pipeline.parameters.small >>
    steps:
      - checkout
      - setup_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-all-targets-cache
      - run:
          name: Check all targets
          no_output_timeout: 35m
          command: cargo check --release --workspace --all-targets
      - clear_environment:
          cache_key: v4.2.0-rust-1.88.0-snarkvm-all-targets-cache

  verify-windows:
    executor:
      name: windows/default
      size: xlarge
    environment:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    parameters:
      workspace_member:
        type: string
    steps:
      - check_windows:
          workspace_member: << parameters.workspace_member >>

