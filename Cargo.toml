optional = true
features = [ "preserve_order" ]

[dependencies.ureq]
workspace = true
optional = true
features = [ "json" ]
default-features = true

[dev-dependencies.snarkvm]
path = "."

[dev-dependencies.bincode]
workspace = true

[dev-dependencies.rusty-hook]
version = "0.11.2"

[dev-dependencies.tempfile]
workspace = true

[build-dependencies.walkdir]
version = "2"

[profile.release]
opt-level = 3
lto = "thin"
incremental = true

[profile.bench]
opt-level = 3
debug = false
rpath = false
lto = "thin"
incremental = true
debug-assertions = false

[profile.dev]
opt-level = 3
lto = "off"
incremental = true

[profile.test]
opt-level = 3
lto = "thin"
incremental = true
debug = true
debug-assertions = true

