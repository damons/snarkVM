[package]
name = "snarkvm"
version = "4.3.0"
authors = [ "The Aleo Team <hello@aleo.org>" ]
description = "A decentralized virtual machine"
homepage = "https://aleo.org"
repository = "https://github.com/ProvableHQ/snarkVM"
keywords = [
  "aleo",
  "cryptography",
  "blockchain",
  "decentralized",
  "zero-knowledge"
]
categories = [
  "compilers",
  "cryptography",
  "mathematics",
  "wasm",
  "web-programming"
]
include = [ "Cargo.toml", "vm", "README.md", "LICENSE.md" ]
license = "Apache-2.0"
edition = "2024"
rust-version = "1.88.0" # Attention - Change the MSRV in rust-toolchain and in .circleci/config.yml as well

[workspace]
members = [
  "algorithms",
  "algorithms/cuda",
  "circuit",
  "circuit/account",
  "circuit/algorithms",
  "circuit/collections",
  "circuit/environment",
  "circuit/environment/witness",
  "circuit/network",
  "circuit/program",
  "circuit/types",
  "circuit/types/address",
  "circuit/types/boolean",
  "circuit/types/field",
  "circuit/types/group",
  "circuit/types/integers",
  "circuit/types/scalar",
  "circuit/types/string",
  "console",
  "console/account",
  "console/algorithms",
  "console/collections",
  "console/network",
  "console/network/environment",
  "console/program",
  "console/types",
  "console/types/address",
  "console/types/boolean",
  "console/types/field",
  "console/types/group",
  "console/types/integers",
  "console/types/scalar",
  "console/types/string",
  "curves",
  "fields",
  "ledger",
  "ledger/authority",
  "ledger/block",
  "ledger/committee",
  "ledger/narwhal",
  "ledger/narwhal/batch-certificate",
  "ledger/narwhal/batch-header",
  "ledger/narwhal/data",
  "ledger/narwhal/subdag",
  "ledger/narwhal/transmission",
  "ledger/narwhal/transmission-id",
  "ledger/puzzle",
  "ledger/puzzle/epoch",
  "ledger/query",
  "ledger/store",
  "ledger/test-helpers",
  "ledger/testchain-generator",
  "metrics",
  "parameters",
  "synthesizer",
  "synthesizer/process",
  "synthesizer/program",
  "synthesizer/snark",
  "utilities",
  "utilities/derives",
  "wasm"
]

[lib]
path = "vm/lib.rs"

[features]
default = [
  "algorithms",
  "circuit",
  "console",
  "ledger",
  "parameters",
  "synthesizer",
  "utilities",
  "package",
  "file",
]
full = [
  "default",
  "curves",
  "fields",
]
file = [
  "console",
  "synthesizer",
  "dep:serde_json"
]
package = [
  "algorithms",
  "circuit",
  "file",
  "ledger",
  "snarkvm-console/filesystem",
  "dep:ureq",
  "dep:dotenvy"
]

async = [ "snarkvm-ledger/async", "snarkvm-synthesizer/async" ]
cuda = [ "snarkvm-algorithms/cuda" ]
history = [ "snarkvm-synthesizer/history" ]
parameters_no_std_out = [ "snarkvm-parameters/no_std_out" ]
locktick = [
  "snarkvm-algorithms?/locktick",
  "snarkvm-ledger?/locktick",
  "snarkvm-parameters?/locktick",
  "snarkvm-synthesizer?/locktick"
]
noconfig = [ ]
rocks = [ "snarkvm-ledger/rocks", "snarkvm-synthesizer/rocks" ]
test = [ "snarkvm-ledger/test" ]
test-helpers = [ "snarkvm-ledger/test-helpers" ]
timer = [ "snarkvm-ledger/timer" ]
algorithms = [ "snarkvm-algorithms" ]
circuit = [ "snarkvm-circuit" ]
console = [ "snarkvm-console" ]
curves = [ "snarkvm-curves" ]
fields = [ "snarkvm-fields" ]
ledger = [ "snarkvm-ledger" ]
metrics = [ "snarkvm-metrics", "snarkvm-ledger/metrics" ]
parameters = [ "snarkvm-parameters" ]
synthesizer = [ "snarkvm-synthesizer" ]
utilities = [ "snarkvm-utilities" ]
wasm = [ "snarkvm-wasm" ]
serial = [
  "snarkvm-algorithms?/serial",
  "snarkvm-console?/serial",
  "snarkvm-curves?/serial",
  "snarkvm-fields?/serial",
  "snarkvm-utilities/serial",
  "snarkvm-ledger?/serial"
]

dev-print = [ 
  "snarkvm-utilities/dev-print",
  "snarkvm-algorithms/dev-print",
  "snarkvm-circuit/dev-print",
  "snarkvm-curves/dev-print",
  "snarkvm-fields/dev-print",
  "snarkvm-parameters/dev-print",
  "snarkvm-synthesizer/dev-print",
]
dev_skip_checks = [
  "snarkvm-console/dev_skip_checks",
  "snarkvm-synthesizer/dev_skip_checks"
]
save_r1cs_hashes = [ "snarkvm-circuit/save_r1cs_hashes" ]
test_exports = [ "snarkvm-algorithms/test_exports" ]
test_targets = [ "snarkvm-console/test_targets" ]
test_consensus_heights = [ "snarkvm-console/test_consensus_heights" ]

[workspace.dependencies.snarkvm-algorithms]
path = "algorithms"
version = "=4.3.0"
default-features = false

[workspace.dependencies.snarkvm-algorithms-cuda]
path = "algorithms/cuda"
version = "=4.3.0"

