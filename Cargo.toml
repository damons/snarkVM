workspace = true
optional = true
features = [ "default" ]

[dependencies.snarkvm-curves]
workspace = true
optional = true

[dependencies.snarkvm-fields]
workspace = true
optional = true

[dependencies.snarkvm-ledger]
workspace = true
optional = true

[dependencies.snarkvm-metrics]
