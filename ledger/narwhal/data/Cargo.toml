[package]
name = "snarkvm-ledger-narwhal-data"
version = "4.1.0"
authors = [ "The Aleo Team <hello@aleo.org>" ]
description = "A batch certificate for a Narwhal-style memory pool in a decentralized virtual machine"
homepage = "https://aleo.org"
repository = "https://github.com/ProvableHQ/snarkVM"
keywords = [
  "aleo",
  "cryptography",
  "blockchain",
  "decentralized",
  "zero-knowledge"
]
categories = [
  "compilers",
  "cryptography",
  "mathematics",
  "wasm",
  "web-programming"
]
include = [ "Cargo.toml", "src", "README.md", "LICENSE.md" ]
license = "Apache-2.0"
edition = "2024"

[features]
async = [ "tokio" ]

[dependencies.snarkvm-console]
workspace = true
features = [ "default" ]

[dependencies.bytes]
workspace = true

[dependencies.serde_json]
workspace = true
features = [ "preserve_order" ]

[dependencies.tokio]
optional = true
version = "1"
features = [ "rt" ]

[dev-dependencies.snarkvm-ledger-block]
workspace = true

[dev-dependencies.snarkvm-ledger-test-helpers]
workspace = true
